  <meta charset="UTF-8">

  <meta property="og:site_name" content="まいにち！ラピ読">
  <meta property="og:title" content="まいにち！ラピ読 - ログイン">
  <meta property="og:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">

</head>
<body class="page page--top">

  <main class="container">

    <!-- サイトタイトル -->
    <h1 class="ma-0">
      <img src="./img/rapidoku_logo.png" alt="まいにち！ラピ読　1日5分の高速(rapid)音読で脳を活性化" class="w-100">
    </h1>

    <!-- 本日のテキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 id="title" class="card__title">ログイン</h2>
      </div>
      <div class="card__body">
        <div class="login_box">
          <form id="login-form">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" autocomplete="email" placeholder="rapidoku@mail.test" class="one-line-input" required>
            <label for="password" class="mt-8">パスワード</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="password" class="one-line-input" required>
            <button id="submitBtn" type="submit" class="btn btn--primary btn--large mt-16">ログイン</button>
            <p id="error" class="text-danger font-small display-none mt-8 mb-0">エラーサンプル</p>
          </form>
        </div>
        <p id="toggleText" class="font-small">アカウントをお持ちでない方はこちら</p>
      </div>

    </section>

  </main>
  <footer class="text-center">
    <small>
      &copy; 2026 junisura ｜ <a href="./info.html" class="link">お問い合わせ</a>
    </small>
  </footer>
