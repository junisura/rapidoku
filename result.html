<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5DB7E8">
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/pages/result.js"></script>
  <title>まいにち！ラピ読 - 結果</title>
  <meta property="og:site_name" content="まいにち！ラピ読">
  <meta property="og:title" content="まいにち！ラピ読 - 結果">
  <meta property="og:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta property="og:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://junisura.github.io/rapidoku/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="まいにち！ラピ読 - 結果">
  <meta name="twitter:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta name="twitter:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
</head>
<body class="page page--result">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="btn btn--secondary header__back">
        <span class="material-symbols-outlined">home</span>
        <span class="btn__label">TOPへ</span>
      </a>
      <img src="./img/rapidoku_logo_mini.png" class="mini-banner" alt="">
    </div>
  </header>

  <main class="container">

    <!-- 今回結果 -->
    <section class="card card--main">
      <div class="card__header text-center">
        <h2 class="card__title">今回の記録<span id="best-updated" class="font-small ml-8 text-success display-none">自己ベスト更新！</span></h2>
        <button id="xShareBtn" class="btn btn--secondary font-small">Xでシェア</span></button>
      </div>
      <div class="card__body today-result">
        <img id="result__img" src="./img/rapidoku_result_neutral.png" width="100px" alt="計測して偉い" />
        <div id="result__record" class="score">
          <span id="last__time" class="result__time l-inline-nowrap"></span><wbr>
          <span id="last__speed" class="result__speed l-inline-nowrap"></span>
        </div>
        </div>
      </div>

      <div id="memo-area" class="card__body mt-8">
        <div class="flex-area-center">
          <input type="text" id="memo__input" placeholder="一言メモ" maxlength="100" class="one-line-input">
          <button id="saveMemoBtn" type="button" class="btn btn--other no-wrap">
            <span class="material-symbols-outlined">edit_square</span>
            <span class="btn__label">保存</span>
          </button>
        </div>
        <p id="memo__output" class="display-none"></p>
        <p id="memo__error" class="text-danger display-none mt-8 mb-0"></p>
        </p>
      </div>
    </section>


    <!-- 前回比較 -->
    <section id="diff-card" class="card card--sub mt-16 display-none">
      <div class="card__header">
        <h3 class="card__title">前回の記録との比較</h3>
      </div>
      <div class="card__body">
        <div class="result__row border-bottom">
          <span>前回</span>
          <span id="prev__time" class="font-large score">mi:ss.sss</span>
          <span id="prev__speed">（x.xx文字/秒）</span>
        </div>
        <div class="result__diff text-center mt-4">
          <span id="diff__time" class="score"></span>
          <span id="diff__badge"></span>
        </div>
      </div>
    </section>

    <!-- 本日の一覧 -->
    <section class="card card--sub mt-16">
      <div class="card__header">
        <h3 class="card__title">本日の記録一覧</h3>
      </div>

      <ul id="records" class="list">
      </ul>
      <p><a class="link font-small" href="./history.html">▶前日までの記録を見る</a></p>
    </section>

    <!-- アクション -->
    <div class="mt-16">
      <button id="retryBtn" type="button" class="btn btn--primary btn--block">
        <span class="material-symbols-outlined">refresh</span>
        <span class="btn__label">もう一度計測する</span>
      </button>
    </div>

    <div class="mt-16">
      <a href="index.html" class="btn btn--secondary btn--block">
        <span class="material-symbols-outlined">home</span>
        <span class="btn__label">TOPへ</span>
      </a>
    </div>

  </main>
  <footer class="text-center">
    <small>
      &copy; 2026 junisura ｜
      <a href="./info.html" class="link">お問い合わせ</a> ｜
      <a href="https://odaibako.net/u/rapidoku" target="_blank" rel="noopener noreferrer" class="link">お題募集</a>
    </small>
  </footer>

  <template id="list-item-template">
    <li class="list__item">
      <div class="record-main">
        <span class="item__best text-best font-small material-symbols-outlined">　</span>
        <span class="item__timestamp text-center text-muted">hh:mi</span>
        <span class="item__time score font-large">mi:ss.sss</span>
        <span class="item__speed"><span class="speed score">x.xx</span><span class="unit font-small">文字/秒</span></span>
      </div>
      <div class="record-memo">
        <p class="item__memo"></p>
        <button type="button" class="memo-toggle">
          <span class="material-symbols-outlined">expand_more</span>
        </button>
      </div>
    </li>
  </template>
</body>
</html>
