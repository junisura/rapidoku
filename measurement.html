<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5DB7E8">
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <link href="./css/measurement.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/pages/measurement.js"></script>
  <title>まいにち！ラピ読 - 計測</title>
  <meta property="og:site_name" content="まいにち！ラピ読">
  <meta property="og:title" content="まいにち！ラピ読 - 計測">
  <meta property="og:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta property="og:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://junisura.github.io/rapidoku/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="まいにち！ラピ読 - 計測">
  <meta name="twitter:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta name="twitter:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
</head>
<body class="page page--measurement">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="btn btn--secondary header__back">
        <span class="material-symbols-outlined">home</span>
        <span class="btn__label">TOPへ</span>
      </a>
      <img src="./img/rapidoku_logo_mini.png" class="mini-banner" alt="">
    </div>
  </header>

  <main class="container pb-timer-space">

    <!-- テキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">本日のテキスト</h2>
        <span id="today-date" class="text-muted"></span>
      </div>

      <div class="card__body">
        <div id="category-frame" class="category-frame"></div>
        <h3 id="text-title" class="text-title mt-8"></h3>
        <p id="text-body" class="text-body"></p>
        <p id="text-count" class="text-muted mt-8 text-right"></p>
      </div>
    </section>

    <!-- タイマーエリア -->
    <section class="timer-box">
      <div id="timer-row" class="timer-row">
        <div id="timer-value" class="timer__value">00:00.00</div>
      </div>

      <div id="control-row" class="control-row">
        <button id="resetBtn" type="button" class="btn btn--secondary control__btn btn--reset">
          <span class="material-symbols-outlined">replay</span>
          <span class="btn__label">リセット</span>
        </button>

        <div class="control__center">
          <button id="startPauseBtn" type="button" class="btn btn--primary btn--large control__start">
            <span class="material-symbols-outlined">play_arrow</span>
            <span class="btn__label">開始</span>
          </button>
          <p class="control__hint mt-8">タップで開始・停止を切替</p>
        </div>

        <button id="stopBtn" type="button" class="btn btn--danger control__btn btn--stop">
          <span class="material-symbols-outlined">stop</span>
          <span class="btn__label">終了</span>
        </button>
      </div>

      <div id="message-row" class="message-row display-none">
        <div>計測するにはログインが必要です</div>
        <a href="./login.html?redirect=measurement.html" class="btn btn--other mt-16">
          <span class="material-symbols-outlined">login</span>
          <span class="btn__label">ログイン／新規登録</span>
        </a>
      </div>
    </section>

  </main>
</body>
</html>
