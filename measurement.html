<!DOCTYPE html>
<html lang="ja">
<head>
  <script type="module" src="./js/auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <script type="module" src="./js/measurement.js"></script>
  <title>まいにち！ラピ読 - 計測</title>
</head>
<body class="page page--measurement">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <button class="btn btn--secondary header__back">
        ← TOPへ
      </button>
    </div>
  </header>

  <main class="container">

    <!-- テキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">本日のテキスト</h2>
        <span class="text-muted">m月d日（aaa）</span>
      </div>

      <div class="card__body">
        <h3 class="text-title">テキストタイトル</h3>
        <p class="text-category">テキストカテゴリ</p>
        <p class="text-body">テキスト本文</p>

        <div class="text-muted mt-8 text-right">
          文字数：x,xxx字（目安：mi分s秒）
        </div>
      </div>
    </section>

    <!-- 操作エリア -->
    <section class="control mt-16">

      <!-- メイン操作 -->
      <div class="control__main">
        <button class="btn btn--primary btn--large control__start">
          ▶ 開始
        </button>
        <div class="text-muted text-center mt-8">
          タップで開始・停止を切替
        </div>
      </div>

      <!-- サブ操作 -->
      <div class="control__side mt-16">

        <button class="btn btn--secondary control__reset">
          ↺ リセット
        </button>

        <button class="btn btn--danger control__stop">
          ■ 終了
        </button>

      </div>

    </section>

    <!-- タイマー -->
    <section class="timer mt-16">
      <div class="timer__value">mi:ss.sss</div>
    </section>

  </main>
</body>
</html>
