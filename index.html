<!DOCTYPE html>
<html lang="ja">
<head>
  <script type="module" src="./js/auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <script type="module" src="./js/top.js"></script>
  <title>まいにち！ラピ読 - TOP</title>
</head>
<body class="page page--top">

  <main class="container">

    <!-- サイトタイトル -->
    <h1 class="mt-8">
      <div id="logo" class="">まいにち！ラピ読</div><!-- タイトルロゴにする 今のテキストはALTに置く-->
      <div id="copy" class="font-medium">高速（rapid）音読で脳を活性化💪</div>
    </h1>

    <!-- 本日のテキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">本日のテキスト</h2>
        <span id="today-date" class="text-muted">m月d日（aaa）</span>
      </div>

      <div class="card__body">
        <h3 id="text-title" class="text-title">テキストタイトル</h3>
        <p id="text-category" class="text-category">テキストカテゴリ</p>
      </div>
    </section>

    <!-- ベスト記録 -->
    <section class="card card--sub mt-16">
      <div class="card__header">
        <span>自己ベスト記録</span>
      </div>
      <div class="card__body text-center">
        <div id="best-record" class="score text-strong">mi:ss.sss</div>
        <div id="best-date" class="text-muted">yyyy年m月d日</div>
      </div>
    </section>

    <!-- CTA -->
    <div class="mt-16">
      <button id="openBtn" class="btn btn--primary btn--block">テキストを開く</button>
    </div>

    <!-- サブ導線 -->
    <div class="mt-8">
      <button id="historyBtn" class="btn btn--secondary btn--block" onclick="location.href='history.html'">過去ログを見る</button>
    </div>

    <!-- 補助 -->
    <div class="mt-8 text-center">
      <a href="howto.html" class="link">使い方・効果を見る</a>
    </div>

  </main>
</body>
</html>
