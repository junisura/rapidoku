<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/pages/index.js"></script>
  <title>まいにち！ラピ読 - TOP</title>
  <meta property="og:site_name" content="まいにち！ラピ読">
  <meta property="og:title" content="まいにち！ラピ読 - TOP">
  <meta property="og:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta property="og:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://junisura.github.io/rapidoku/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="まいにち！ラピ読 - TOP">
  <meta name="twitter:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta name="twitter:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
</head>
<body class="page page--top">

  <header class="header pa-0">
    <div class="text-right">
      <p id="logoutBtn" class="btn btn--conf header__back display-none">
        <span class="material-symbols-outlined font-xs">logout</span>
        <span class="btn__label font-xs">ログアウト</span>
      </p>
    </div>
  </header>

  <main class="container">

    <!-- サイトタイトル -->
    <h1 class="ma-0">
      <img src="./img/rapidoku_logo.png" alt="まいにち！ラピ読　1日5分の高速(rapid)音読で脳を活性化" class="w-100">
    </h1>

    <!-- 本日のテキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">本日のテキスト</h2>
        <span id="today-date" class="text-muted"></span>
      </div>

      <div class="card__body">
        <div id="category-frame" class="category-frame"></div>
        <h3 id="text-title" class="text-title mt-8 mb-16"></h3>
      </div>

      <div class="mt-16">
        <button id="openBtn" type="button" class="btn btn--primary btn--block" disabled>
          <span class="material-symbols-outlined">import_contacts</span>
          <span class="btn__label">テキストを開く</span>
        </button>
      </div>

      <div id="records-count" class="font-small text-center mt-8"></div>
    </section>

    <!-- ベスト記録 -->
    <section id="best-record-section" class="card card--sub card-has-image display-none mt-16">
      <div class="card__header">
        <h2 class="card__title">自己ベスト記録</h2>
        <span><img src="./img/trophy.png" alt="" class="best-card__icon"></span>
      </div>
      <div class="card__body text-center">
        <div id="best-record" class="score text-strong">mi:ss.sss</div>
        <div id="best-date" class="text-muted">yyyy年m月d日</div>
      </div>
    </section>

    <div class="mt-16">
      <a id="historyBtn" type="button" class="btn btn--secondary btn--block display-none" href="./history.html">
        <span class="material-symbols-outlined">history_edu</span>
        <span class="btn__label">過去ログを見る</span>
      </a>
    </div>

    <div class="mt-16">
      <a id="loginBtn" type="button" class="btn btn--secondary btn--block display-none" href="./login.html">
        <span class="material-symbols-outlined">login</span>
        <span class="btn__label">ログイン／新規登録</span>
      </a>
    </div>

    <div class="mt-8">
      <a id="historyBtn" type="button" class="btn btn--other btn--block" href="./howto.html">
        <span class="material-symbols-outlined">help</span>
        <span class="btn__label">使い方・高速音読について</span>
      </a>
    </div>

  </main>

  <footer class="text-center">
    <small>
      &copy; 2026 junisura ｜
      <a href="./info.html" class="link">お問い合わせ</a> ｜
      <a href="https://odaibako.net/u/rapidoku" target="_blank" rel="noopener noreferrer" class="link">お題募集</a>
    </small>
  </footer>
</body>
</html>
