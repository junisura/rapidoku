<!DOCTYPE html>
<html lang="ja">
<head>
  <script type="module" src="./js/auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <script type="module" src="./js/history.js"></script>
  <title>まいにち！ラピ読 - 過去ログ</title>
</head>
<body class="page page--history">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <button class="btn btn--secondary header__back">
        ← TOPへ
      </button>
    </div>
  </header>

  <main class="container">

    <!-- カレンダー -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">記録カレンダー</h2>
        <div class="calendar__nav">
          <button class="btn btn--secondary">‹</button>
          <span class="calendar__month">2024年5月</span>
          <button class="btn btn--secondary">›</button>
        </div>
      </div>

      <div class="card__body">
        <div class="calendar">

          <!-- 曜日 -->
          <div class="calendar__week">
            <span>日</span><span>月</span><span>火</span>
            <span>水</span><span>木</span><span>金</span><span>土</span>
          </div>

          <!-- 日付 -->
          <div class="calendar__grid">

            <button class="calendar__day">1</button>
            <button class="calendar__day is-recorded">2</button>
            <button class="calendar__day is-recorded is-selected">3</button>
            <button class="calendar__day">4</button>
            <button class="calendar__day">5</button>

            <!-- 以下ループ -->
          </div>

        </div>
      </div>
    </section>

    <!-- 選択日の記録 -->
    <section class="card card--sub mt-16">
      <div class="card__header">
        <h3 class="card__title">m月d日(aaa)の記録</h3>
      </div>

      <ul class="list">
        <li class="list__item">
          <span>n回目</span>
          <span>mi:ss.sss</span>
        </li>
      </ul>
    </section>

    <!-- テキスト本文 -->
    <section class="card card--sub mt-16">
      <div class="card__header">
        <h3 class="card__title">テキストタイトル</h3>
        <p class="text-category">テキストカテゴリ</p>
      </div>

      <div class="card__body">
        <p class="text-body">テキスト本文</p>
      </div>
    </section>

  </main>
</body>
</html>
