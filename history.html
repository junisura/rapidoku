<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5DB7E8">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <link href="./css/calendar.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/pages/history.js"></script>
  <title>まいにち！ラピ読 - 過去ログ</title>
  <meta property="og:site_name" content="まいにち！ラピ読">
  <meta property="og:title" content="まいにち！ラピ読 - 過去ログ">
  <meta property="og:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta property="og:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://junisura.github.io/rapidoku/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="まいにち！ラピ読 - 過去ログ">
  <meta name="twitter:description" content="声に出して、頭が冴える。1日5分の高速音読で脳を活性化">
  <meta name="twitter:image" content="https://junisura.github.io/rapidoku/img/rapidoku_ogp.png">
</head>
<body class="page page--history">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="btn btn--secondary header__back">
        <span class="material-symbols-outlined">home</span>
        <span class="btn__label">TOPへ</span>
      </a>
      <img src="./img/rapidoku_logo_mini.png" class="mini-banner" alt="">
    </div>
  </header>

  <main class="container">

    <!-- 連続記録 -->
    <section id="streak-section" class="card card--sub">
      <div class="card__header">
        <h3 class="card__title">連続記録</h3>
      </div>
      <div><span id="streak-days" class="font-xl-sm"></span>　<span id="warning" class="text-danger display-none font-small">今日の分がまだだよ！</span></div>
      <div class="streak__max"><span id="max-streak-days" class="font-sm text-muted"></span></div>
    </section>

    <!-- カレンダー -->
    <section class="mt-16">
      <div class="card__header flex-center-center">
        <div class="calendar__nav flex-area-center">
          <button id="prevYearBtn" type="button" class="btn btn--calendar material-symbols-outlined" disabled>keyboard_double_arrow_left</button>
          <button id="prevMonthBtn" type="button" class="btn btn--calendar material-symbols-outlined" disabled>keyboard_arrow_left</button>
          <span id="month-label" class="calendar__month">yyyy年m月</span>
          <button id="nextMonthBtn" type="button" class="btn btn--calendar material-symbols-outlined" disabled>keyboard_arrow_right</button>
          <button id="nextYearBtn" type="button" class="btn btn--calendar material-symbols-outlined" disabled>keyboard_double_arrow_right</button>
        </div>
      </div>

      <div class="card__body">
        <div class="calendar">

          <!-- 曜日 -->
          <div class="calendar__week calendar__grid">
            <span class="sunday">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="saturday">土</span>
          </div>
          <!-- 日付 -->
          <div id="calendar-date" class="calendar__grid">
          </div>

        </div>
      </div>
    </section>

    <!-- 選択日の記録 -->
    <section class="card card--sub mt-16">
      <div class="card__header">
        <h3 class="card__title"><span id="record-date"></span></h3>
      </div>

      <ul id="records" class="list">
      </ul>
    </section>

    <!-- テキスト本文 -->
    <section id="text-section" class="card card--sub mt-16 display-none">
      <div class="card__header">
        <h3 class="card__title">この日のテキスト</h3>
      </div>

      <div class="card__body">
        <h3 id="text-title"></h3>
        <div class="flex-area-center"><p class="category-frame">
          <span class="category-label">カテゴリ</span><span id="text-category" class="text-category"></span>
        </p></div>
        <p id="text-body" class="text-body font-small"></p>
      </div>
    </section>

  </main>
  <footer class="text-center">
    <small>
      &copy; 2026 junisura ｜
      <a href="./info.html" class="link">お問い合わせ</a> ｜
      <a href="https://odaibako.net/u/rapidoku" target="_blank" rel="noopener noreferrer" class="link">お題募集</a>
    </small>
  </footer>

  <template id="list-item-template">
    <li class="list__item">
      <div class="record-main">
        <span class="item__best text-best font-small material-symbols-outlined">　</span>
        <span class="item__timestamp text-center text-muted">hh:mi</span>
        <span class="item__time score font-large">mi:ss.sss</span>
        <span class="item__speed"><span class="speed score">x.xx</span><span class="unit font-small">文字/秒</span></span>
      </div>
      <div class="record-memo">
        <p class="item__memo"></p>
        <button class="memo-toggle" type="button">
          <span class="material-symbols-outlined">expand_more</span>
        </button>
      </div>
    </li>
  </template>
</body>
</html>
