<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./css/common.css" rel="stylesheet">
  <link href="./css/calendar.css" rel="stylesheet">
  <link href="./css/record-list.css" rel="stylesheet">
  <script type="module" src="./js/history.js"></script>
  <title>音読アプリ - 過去ログ</title>
  <style>
#streak-section {
  text-align: center;
}
.compact-title {
  margin: 0.5rem 0;
}
#text {
  line-height: 1.8;
  white-space: pre-wrap;
}
  </style>
</head>
<body>

<h1>過去ログ</h1>
<section>
  <div id="month">
    <button id="prevYearBtn" class="compact material-symbols-outlined">keyboard_double_arrow_left</button>
    <button id="prevMonthBtn" class="compact material-symbols-outlined">keyboard_arrow_left</button>
    <span id="monthLabel"></span>
    <button id="nextMonthBtn" class="compact material-symbols-outlined">keyboard_arrow_right</button>
    <button id="nextYearBtn" class="compact material-symbols-outlined">keyboard_double_arrow_right</button>
  </div>
  <div id="calendar" class="calendar"></div>
</section>
<section id="streak-section" class="under-border">
  <div id="streak" class="large"></div>
  <span id="warning" class="bad hidden">今日の分がまだだよ！</span>
</section>

<section id="detail">
  <h2 class="small">詳細</h2>
  <div id="records"></div>
  <div id="content-info">
    <h3 id="title" class="compact-title"></h3>
    <h4 id="genre" class="compact-title"></h4>
    <div id="text"></div>
  </div>
</section>

<section>
  <button id="backBtn" onclick="location.href='index.html'" class="compact">
    <span class="material-symbols-outlined">arrow_back_2</span>
    <span class="label">戻る</span>
  </button>
</section>

<template id="record-item-template">
  <div class="record-item">
    <div class="main-row score">
      <span class="attempt"></span>
      <span class="speed"></span>
      <span class="time"></span>
    </div>
    <div class="memo"></div>
  </div>
</template>
</body>
</html>
